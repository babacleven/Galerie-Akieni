<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galerie - Akieni Academy</title>
    <link rel="stylesheet" href="galerie.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h1>Galerie <span>Akieni </span>Academy</h1>
        <p>Découvrez les moments forts de notre communauté</p>
      </div>
    </header>

    <input type="radio" name="filter" id="filter-all" checked hidden />
    <input type="radio" name="filter" id="filter-evenements" hidden />
    <input type="radio" name="filter" id="filter-paysages" hidden />
    <input type="radio" name="filter" id="filter-portraits" hidden />

    <main class="container">
      <div class="filters">
        <label class="filter-btn active-filter" for="filter-all">Tous</label>
        <label class="filter-btn" for="filter-evenements">Événements</label>
        <label class="filter-btn" for="filter-paysages">Paysages</label>
        <label class="filter-btn" for="filter-portraits">Portraits</label>
      </div>

      <div class="gallery">
        <figure class="gallery-item featured evenements">
          <img src="images/Akieni_evenement.jpg" alt="Événement Akieni Academy" loading="lazy" />
          <figcaption class="overlay">
            <h3>Retenez ces visages</h3>
            <p>Ils incarnent une génération qui a fait le choix d'agir. Arrivés avec des questions et parfois des doutes, ils repartent aujourd'hui avec des compétences, de la confiance et une ambition claire. Ce sont plus de 30 jeunes dont le potentiel s'est transformé en résultats concrets. AKIENI ACADEMY ne forme pas seulement des profils. Nous révélons des talents.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item paysages">
          <img src="images/brazzaville_vue_panoramique_sur_le_fleuve.jpg" alt="Vue panoramique sur le fleuve Brazzaville" loading="lazy" />
          <figcaption class="overlay">
            <h3>Brazzaville</h3>
            <p>Vue panoramique sur le fleuve</p>
          </figcaption>
        </figure>

        <figure class="gallery-item portraits">
          <img src="images/coordonateur_data_science.jpg" alt="Coordinateur pédagogique" loading="lazy" />
          <figcaption class="overlay">
            <h3>Coordinateur pédagogique</h3>
            <p>Pilotage pédagogique et accompagnement d'une cohorte de 200+ apprenants sur le parcours Fullstack Development. Suivi individualisé, détection des risques de décrochage, animation des stand-ups, coordination avec les mentors, dashboards de suivi, analyse des données pédagogiques, accompagnement technique et amélioration continue.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item portraits">
          <img src="images/Frederic3.png" alt="Frédéric NZE - Fondateur" loading="lazy" />
          <figcaption class="overlay">
            <h3>Frédéric NZE</h3>
            <p>Fondateur et Directeur Général</p>
          </figcaption>
        </figure>

        <figure class="gallery-item portraits">
          <img src="images/coodornateur_fullstack.png" alt="Coordinateur pédagogique" loading="lazy" />
          <figcaption class="overlay">
            <h3>Coordinateur pédagogique</h3>
            <p>Pilotage pédagogique et accompagnement d'une cohorte de 200+ apprenants sur le parcours Fullstack Development. Suivi individualisé, détection des risques de décrochage, animation des stand-ups, coordination avec les mentors, dashboards de suivi, analyse des données pédagogiques, accompagnement technique et amélioration continue.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item portraits">
          <img src="images/Lepres KIKOUNGA.png" alt="Lepres KIKOUNGA - Engineering Manager" loading="lazy" />
          <figcaption class="overlay">
            <h3>Lepres KIKOUNGA</h3>
            <p>Senior Engineering Manager</p>
          </figcaption>
        </figure>

        <figure class="gallery-item evenements">
          <img src="images/Hackathon.jpg" alt="Hackathon Akieni" loading="lazy" />
          <figcaption class="overlay">
            <h3>Hackathon</h3>
            <p>48H pour innover, créer, repousser les limites. Du 14 au 15 mai, Akieni Academy réunit ses talents pour un défi unique à OSIANE 2025. Deux jours d'intensité, de code, d'échanges et d'idées tournées vers l'avenir. Une énergie à ne pas manquer.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item evenements">
          <img src="images/formation.jpg" alt="Formation Akieni Academy" loading="lazy" />
          <figcaption class="overlay">
            <h3>Bâtir des carrières</h3>
            <p>Pas juste des compétences. Chez Akieni Academy, nous vous préparons à un avenir numérique solide en vous offrant une formation qui va au-delà du savoir-faire afin de relever les défis du digital et transformer le secteur public et privé au Congo et en Afrique.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item evenements">
          <img src="images/Akieni_evenement4.jpg" alt="Cérémonie Akieni" loading="lazy" />
          <figcaption class="overlay">
            <h3>Cérémonie</h3>
            <p>Célébration de la promotion</p>
          </figcaption>
        </figure>

        <figure class="gallery-item evenements">
          <img src="images/Akieni_evenement5.jpg" alt="Remise des diplômes Akieni" loading="lazy" />
          <figcaption class="overlay">
            <h3>Remise des diplômes</h3>
            <p>Célébration de la promotion</p>
          </figcaption>
        </figure>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; <span id="displayYear"></span> Akieni Academy — Galerie CSS Grid</p>
      </div>
    </footer>
  </body>
</html>
